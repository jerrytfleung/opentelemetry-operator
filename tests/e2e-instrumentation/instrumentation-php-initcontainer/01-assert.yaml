apiVersion: v1
kind: Pod
metadata:
  labels:
    app: my-php-initcontainer
spec:
  initContainers:
  # The instrumentation init container must come FIRST (before the target init container)
  - name: opentelemetry-auto-instrumentation-clone-php
    volumeMounts:
    - mountPath: /otel-auto-instrumentation-php-clone
      readOnly: true
    - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      readOnly: true
  - name: opentelemetry-auto-instrumentation-php
    volumeMounts:
    - mountPath: /otel-auto-instrumentation-php-clone
      readOnly: true
    - mountPath: /otel-auto-instrumentation-php
      readOnly: true
    - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      readOnly: true
  # The target init container should have the PHP agent env vars and volume mounts
  - name: php-init
    env:
    - name: OTEL_NODE_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.hostIP
    - name: OTEL_POD_IP
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: status.podIP
    - name: OTEL_LOG_LEVEL
      value: debug
    - name: OTEL_TRACES_EXPORTER
      value: otlp
    - name: OTEL_METRICS_EXPORTER
      value: none
    - name: OTEL_LOGS_EXPORTER
      value: none
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://deployment-collector:4318
    - name: OTEL_EXPORTER_OTLP_TIMEOUT
      value: "20000"
    - name: OTEL_TRACES_SAMPLER
      value: always_on
    - name: SPLUNK_TRACE_RESPONSE_HEADER_ENABLED
      value: "true"
    - name: PHP_INI_SCAN_DIR
      value: ":/otel-auto-instrumentation-php"
    - name: OTEL_PHP_AUTOLOAD_ENABLED
      value: "true"
    - name: OTEL_SERVICE_NAME
      value: my-php-initcontainer
    - name: OTEL_RESOURCE_ATTRIBUTES_POD_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: metadata.name
    - name: OTEL_RESOURCE_ATTRIBUTES_NODE_NAME
      valueFrom:
        fieldRef:
          apiVersion: v1
          fieldPath: spec.nodeName
    - name: OTEL_PROPAGATORS
      value: tracecontext,baggage
    - name: OTEL_RESOURCE_ATTRIBUTES
      value:
        ( contains(@, 'k8s.container.name=php-init') ): true
        ( contains(@, 'k8s.pod.name=$(OTEL_RESOURCE_ATTRIBUTES_POD_NAME)') ): true
        ( contains(@, concat('k8s.namespace.name=', $namespace)) ): true
        ( contains(@, 'k8s.node.name=$(OTEL_RESOURCE_ATTRIBUTES_NODE_NAME)') ): true
        ( contains(@, join('', ['service.instance.id=', $namespace, '.$(OTEL_RESOURCE_ATTRIBUTES_POD_NAME).php-init'])  ) ): true
        ( contains(@, 'service.version=main') ): true
    volumeMounts:
    - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      readOnly: true
  containers:
  - name: myapp
status:
  initContainerStatuses:
  - name: opentelemetry-auto-instrumentation-clone-php
    ready: true
  - name: opentelemetry-auto-instrumentation-php
    ready: true
  - name: php-init
    ready: true
  phase: Running
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: opentelemetry-collector
    app.kubernetes.io/managed-by: opentelemetry-operator
    app.kubernetes.io/name: deployment-collector
    app.kubernetes.io/part-of: opentelemetry
  name: deployment-collector
status:
  availableReplicas: 1
  readyReplicas: 1
  replicas: 1
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: opentelemetry-collector
    app.kubernetes.io/managed-by: opentelemetry-operator
    app.kubernetes.io/name: deployment-collector
    app.kubernetes.io/part-of: opentelemetry
  name: deployment-collector
spec:
  ports:
  - appProtocol: grpc
    name: otlp-grpc
    port: 4317
    protocol: TCP
    targetPort: 4317
  - appProtocol: http
    name: otlp-http
    port: 4318
    protocol: TCP
    targetPort: 4318
