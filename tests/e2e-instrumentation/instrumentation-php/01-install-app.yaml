apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-php
spec:
  selector:
    matchLabels:
      app: my-php
  replicas: 1
  template:
    metadata:
      labels:
        app: my-php
      annotations:
        sidecar.opentelemetry.io/inject: "true"
        instrumentation.opentelemetry.io/inject-php: "true"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 3000
      containers:
      - name: myapp
        image: ghcr.io/jerrytfleung/opentelemetry-operator/e2e-test-app-php:main
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
