apiVersion: chainsaw.kyverno.io/v1alpha1
kind: StepTemplate
metadata:
  name: pod-logs
spec:
  try:
    - command:
        entrypoint: kubectl
        env:
          - name: POD_LABEL_SELECTOR
            value: ($podLabelSelector)
        args:
          - get
          - pod
          - -n
          - ${NAMESPACE}
          - -l
          - ${POD_LABEL_SELECTOR}
          - -o
          - jsonpath={.items[0].metadata.name}
        outputs:
          - name: podName
            value: ($stdout)
    - script:
        env:
          - name: podName
            value: ($podName)
        content:
          kubectl logs ${podName}
  finally:
    # Collects pod logs automatically if the script relies on a deployed resource
    - podLogs: { }
